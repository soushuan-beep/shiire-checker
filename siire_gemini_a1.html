<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="創集庵リサーチ">
<title>リサーチ</title>
<style>
:root {
  --bg: #000000; --bg2: #121212; --bg3: #1a1a1a;
  --text: #c0c0c0; --text2: #888; --text3: #555;
  --green: #2d6a4f; --red: #a4161a; --red-bg: rgba(164, 22, 26, 0.1);
  --border: rgba(255,255,255,0.05); --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; overflow-x: hidden; }
.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 120px; }
.hdr { padding: 10px 0; font-size: 18px; font-weight: 800; display: flex; justify-content: space-between; }
.hdr span { color: var(--green); }
.rate-bar { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; padding: 10px; background: var(--bg2); border-radius: 8px; font-size: 11px; border: 1px solid var(--border); }
.icard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
.icard input { width: 100%; background: transparent; border: none; outline: none; font-size: 22px; font-weight: 700; color: #fff; }
.pills { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; }
.pill { padding: 6px 14px; border-radius: 99px; background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; }
.pill.on { background: var(--green); color: #fff; border-color: var(--green); }
.sbtn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.sbtn { padding: 18px 10px; border-radius: 12px; background: var(--bg2); color: var(--text2); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; border: 1px solid var(--border); }
.sbtn-primary { border-color: var(--red); background: var(--red-bg); color: #fff; }
.tcard { background: var(--bg2); border-radius: var(--r); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.trow { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.ttext { font-size: 14px; color: #fff; font-weight: 600; text-align: right; flex: 1; margin-left: 10px; }
.conv-card { background: var(--bg2); border-radius: var(--r); padding: 16px; border: 1px solid var(--border); }
.curr-tabs { display: flex; gap: 10px; margin-bottom: 10px; }
.curr-tab { font-size: 12px; padding: 4px 12px; border-radius: 4px; background: var(--bg3); cursor: pointer; border: 1px solid var(--border); }
.curr-tab.active { background: var(--green); color: #fff; border-color: var(--green); }
.cinput-wrap { position: relative; display: flex; align-items: center; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; margin-top: 5px; }
.cinput-wrap span { padding: 0 10px; font-size: 12px; color: var(--text3); }
.cinput { background: transparent; border: none; outline: none; padding: 12px; width: 100%; color: #fff; font-size: 18px; }
.rbtn { width: 100%; padding: 15px; background: #111; border: 1px solid var(--border); color: var(--text3); border-radius: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr">創集庵リサーチ <span>Stealth</span></div>
  <div class="rate-bar">
    <div id="rate-usd">USD レート取得中...</div>
    <div id="rate-twd">TWD レート取得中...</div>
    <div style="text-align:right; color:var(--green);" onclick="fetchRates()">🔄 更新</div>
  </div>
  
  <div class="icard">
    <input type="text" id="main-input" placeholder="スキャン / 入力" autocomplete="off">
  </div>

  <div class="pills" id="pills">
    <div class="pill on" data-v="中古">中古</div><div class="pill" data-v="未開封">未開封</div><div class="pill" data-v="箱なし">箱なし</div><div class="pill" data-v="新品">新品</div>
  </div>

  <div class="sbtn-row">
    <div class="sbtn" onclick="openSite('ebay')">🛒 eBay</div>
    <div class="sbtn" onclick="openSite('shopee')">🛍 Shopee</div>
  </div>
  <div class="sbtn-row">
    <div class="sbtn sbtn-primary" onclick="openSite('mercari')">⭕ メルカリ</div>
    <div class="sbtn sbtn-primary" onclick="openSite('yahoo')">🔨 ヤフオク</div>
  </div>

  <div class="tcard">
    <div class="trow"><span>🇺🇸 EN</span><span class="ttext" id="t-en">---</span></div>
    <div class="trow"><span>🇹🇼 TW</span><span class="ttext" id="t-tw">---</span></div>
  </div>

  <div class="conv-card">
    <div class="curr-tabs">
      <div id="tab-usd" class="curr-tab active" onclick="setCurr('USD')">USD (eBay)</div>
      <div id="tab-twd" class="curr-tab" onclick="setCurr('TWD')">TWD (Shopee)</div>
    </div>
    <div class="cinput-wrap"><span>JPY</span><input type="number" id="cx-jpy" class="cinput" placeholder="日本円" oninput="conv('jpy')"></div>
    <div class="cinput-wrap"><span id="curr-label">USD</span><input type="number" id="cx-foreign" class="cinput" placeholder="外貨" oninput="conv('f')"></div>
  </div>

  <button class="rbtn" onclick="location.reload()">次の商品へ</button>
</div>

<script>
let conds=new Set(['中古']), activeCurr='USD';
const mainInput=document.getElementById('main-input');

function fetchRates(){
  fetch('https://open.er-api.com/v6/latest/JPY').then(r=>r.json()).then(d=>{
    const usd = (1 / d.rates.USD).toFixed(2);
    const twd = (1 / d.rates.TWD).toFixed(2);
    localStorage.setItem('rate_USD', usd);
    localStorage.setItem('rate_TWD', twd);
    document.getElementById('rate-usd').textContent=`1 USD = ${usd}円`;
    document.getElementById('rate-twd').textContent=`1 TWD = ${twd}円`;
  }).catch(()=> {
    document.getElementById('rate-usd').textContent='レート取得エラー';
  });
}

function setCurr(c){
  activeCurr = c;
  document.getElementById('tab-usd').className = 'curr-tab' + (c==='USD'?' active':'');
  document.getElementById('tab-twd').className = 'curr-tab' + (c==='TWD'?' active':'');
  document.getElementById('curr-label').textContent = c;
  conv('jpy');
}

document.getElementById('pills').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  const v=e.target.dataset.v;
  if(conds.has(v))conds.delete(v); else conds.add(v);
  document.querySelectorAll('.pill').forEach(x=>x.className='pill'+(conds.has(x.dataset.v)?' on':''));
};

mainInput.onkeydown=async e=>{
  if(e.key==='Enter'){
    const q=mainInput.value;
    const c=Array.from(conds).join(' ');
    document.getElementById('t-en').textContent=await trans(q+' '+c,'en');
    document.getElementById('t-tw').textContent=await trans(q+' '+c,'zh-TW');
  }
};

async function trans(t,l){
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=${l}&dt=t&q=${encodeURIComponent(t)}`);
    const d=await r.json(); return d[0][0][0];
  }catch(e){return t;}
}

function openSite(s){
  const q=encodeURIComponent(mainInput.value);
  const en=encodeURIComponent(document.getElementById('t-en').textContent);
  const tw=encodeURIComponent(document.getElementById('t-tw').textContent);
  const urls={
    mercari:`https
