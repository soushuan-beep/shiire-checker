<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="創集庵リサーチ">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">

<title>リサーチ</title>
<style>
:root {
  --bg: #000000; --bg2: #121212; --bg3: #1a1a1a;
  --text: #c0c0c0; --text2: #888; --text3: #555;
  --green: #2d6a4f; --red: #a4161a; --red-bg: rgba(164, 22, 26, 0.1);
  --border: rgba(255,255,255,0.05); --r: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
.app { max-width: 480px; margin: 0 auto; padding: 20px 16px 120px; }
.hdr { padding: 20px 0; display: flex; align-items: center; justify-content: space-between; }
.hdr-title { font-size: 20px; font-weight: 800; }
.hdr-title span { color: var(--green); }
.rate-bar { display: flex; justify-content: space-between; margin-bottom: 12px; padding: 8px 12px; background: var(--bg2); border-radius: 8px; font-size: 11px; border: 1px solid var(--border); }
.icard { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 12px; }
.icard input { width: 100%; background: transparent; border: none; outline: none; font-size: 22px; font-weight: 700; color: #fff; }
.pills { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; }
.pill { padding: 6px 14px; border-radius: 99px; background: var(--bg2); color: var(--text2); font-size: 12px; cursor: pointer; border: 1px solid var(--border); white-space: nowrap; }
.pill.on { background: var(--green); color: #fff; border-color: var(--green); }
.sbtn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.sbtn { padding: 20px 10px; border-radius: 12px; background: var(--bg2); color: var(--text2); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; border: 1px solid var(--border); }
/* メルカリとヤフオクを強調 */
.sbtn-primary { border-color: var(--red); background: var(--red-bg); color: #fff; }
.tcard { background: var(--bg2); border-radius: var(--r); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.trow { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.ttext { font-size: 14px; color: #fff; font-weight: 600; }
.conv-card { background: var(--bg2); border-radius: var(--r); padding: 16px; border: 1px solid var(--border); }
.cinput { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px; width: 100%; color: #fff; font-size: 18px; margin-top: 5px; }
.rbtn { width: 100%; padding: 15px; background: #111; border: 1px solid var(--border); color: var(--text3); border-radius: 12px; margin-top: 20px; }
</style>
</head>
<body>
<div class="app">
  <div class="hdr"><div class="hdr-title">創集庵リサーチ <span>Stealth</span></div></div>
  <div class="rate-bar"><div id="rate-txt">レート取得中...</div><div onclick="fetchRates()">更新</div></div>
  
  <div class="icard">
    <input type="text" id="main-input" placeholder="スキャン / 入力" autocomplete="off">
  </div>

  <div class="pills" id="pills">
    <div class="pill on" data-v="中古">中古</div><div class="pill" data-v="未開封">未開封</div><div class="pill" data-v="箱なし">箱なし</div><div class="pill" data-v="新品">新品</div>
  </div>

  <div class="sbtn-row">
    <div class="sbtn" onclick="openSite('ebay')">🛒 eBay</div>
    <div class="sbtn" onclick="openSite('shopee')">🛍 Shopee</div>
  </div>
  <div class="sbtn-row">
    <div class="sbtn sbtn-primary" onclick="openSite('mercari')">⭕ メルカリ</div>
    <div class="sbtn sbtn-primary" onclick="openSite('yahoo')">🔨 ヤフオク</div>
  </div>

  <div class="tcard">
    <div class="trow"><span>🇺🇸 EN</span><span class="ttext" id="t-en">---</span></div>
    <div class="trow"><span>🇹🇼 TW</span><span class="ttext" id="t-tw">---</span></div>
  </div>

  <div class="conv-card">
    <div style="font-size:10px; color:var(--text3)">円 ⇄ USD 換算</div>
    <input type="number" id="cx-jpy" class="cinput" placeholder="日本円" oninput="conv('jpy')">
    <input type="number" id="cx-usd" class="cinput" placeholder="USD" oninput="conv('usd')">
  </div>

  <button class="rbtn" onclick="location.reload()">次の商品へ（リセット）</button>
</div>

<script>
let conds=new Set(['中古']);
const mainInput=document.getElementById('main-input');

function fetchRates(){
  fetch('https://open.er-api.com/v6/latest/USD').then(r=>r.json()).then(d=>{
    const rate=Math.floor(d.rates.JPY);
    localStorage.setItem('sc_usd',rate);
    document.getElementById('rate-txt').textContent=`1 USD = ${rate}円`;
  }).catch(()=>document.getElementById('rate-txt').textContent='1 USD = 150円(固定)');
}

document.getElementById('pills').onclick=e=>{
  if(!e.target.classList.contains('pill'))return;
  const v=e.target.dataset.v;
  if(conds.has(v))conds.delete(v); else conds.add(v);
  document.querySelectorAll('.pill').forEach(x=>x.className='pill'+(conds.has(x.dataset.v)?' on':''));
};

mainInput.onkeydown=async e=>{
  if(e.key==='Enter'){
    const q=mainInput.value;
    const c=Array.from(conds).join(' ');
    document.getElementById('t-en').textContent=await trans(q+' '+c,'en');
    document.getElementById('t-tw').textContent=await trans(q+' '+c,'zh-TW');
  }
};

async function trans(t,l){
  try{
    const r=await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ja&tl=${l}&dt=t&q=${encodeURIComponent(t)}`);
    const d=await r.json(); return d[0][0][0];
  }catch(e){return t;}
}

function openSite(s){
  const q=encodeURIComponent(mainInput.value);
  const en=encodeURIComponent(document.getElementById('t-en').textContent);
  const tw=encodeURIComponent(document.getElementById('t-tw').textContent);
  const urls={
    mercari:`https://www.mercari.com/jp/search/?keyword=${q}&status=sold_out`,
    yahoo:`https://auctions.yahoo.co.jp/closedsearch/closedsearch?p=${q}`,
    ebay:`https://www.ebay.com/sch/i.html?_nkw=${en}&LH_Sold=1&LH_Complete=1`,
    shopee:`https://shopee.tw/search?keyword=${tw}&sold_out=2`
  };
  window.open(urls[s],'_blank');
}

function conv(type){
  const r=parseFloat(localStorage.getItem('sc_usd'))||150;
  if(type==='jpy'){
    document.getElementById('cx-usd').value=(document.getElementById('cx-jpy').value/r).toFixed(2);
  }else{
    document.getElementById('cx-jpy').value=Math.floor(document.getElementById('cx-usd').value*r);
  }
}
fetchRates();
</script>
</body>
</html>
